services:
  - type: web
    name: ajc-qrcode
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: ajc-data
      mountPath: /var/data
      sizeGB: 1
